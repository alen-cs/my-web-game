<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS - Shooting Mechanics</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
        #score-display {
            position: absolute;
            top: 10px;
            right: 20px;
            color: white;
            font-size: 24px;
            font-family: sans-serif;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="instructions">Click to play. WASD to move. Left Click to shoot.</div>
    <div id="score-display">Score: 0</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Add Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 0);
        scene.add(directionalLight);

        // 3. Create Environment
        const floorGeometry = new THREE.PlaneGeometry(100, 100);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 }); 
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const enemyGeometry = new THREE.BoxGeometry(2, 2, 2);
        const enemyMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
        enemy.position.set(0, 1, -10);
        scene.add(enemy);

        // 4. Create the Gun Model (Attached to Camera)
        const gunGeometry = new THREE.BoxGeometry(0.1, 0.1, 0.6);
        const gunMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const gun = new THREE.Mesh(gunGeometry, gunMaterial);
        // Position the gun to the bottom right of the screen
        gun.position.set(0.3, -0.2, -0.5); 
        camera.add(gun);
        scene.add(camera); // Must add camera to scene for attached objects to render

        // 5. Setup Controls
        const controls = new PointerLockControls(camera, document.body);
        
        document.getElementById('instructions').addEventListener('click', () => {
            controls.lock();
        });
        document.body.addEventListener('click', () => {
            if (!controls.isLocked) controls.lock();
        });

        scene.add(controls.getObject());

        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // 6. Shooting Mechanics
        const bullets = [];
        let score = 0;
        const scoreDisplay = document.getElementById('score-display');

        window.addEventListener('mousedown', (event) => {
            // Only shoot if the mouse is locked (playing the game)
            if (controls.isLocked && event.button === 0) { // 0 is left click
                shoot();
            }
        });

        function shoot() {
            // Create bullet
            const bulletGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 }); // Yellow bullet
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);

            // Start bullet at the camera's position
            bullet.position.copy(camera.position);

            // Determine which way the camera is facing
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);

            // Assign speed and direction to the bullet
            bullet.velocity = direction.multiplyScalar(30); 

            scene.add(bullet);
            bullets.push(bullet);
        }

        // 7. Game Loop
        const clock = new THREE.Clock();
        const playerSpeed = 10.0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Player Movement
            if (controls.isLocked === true) {
                if (moveForward) controls.moveForward(playerSpeed * delta);
                if (moveBackward) controls.moveForward(-playerSpeed * delta);
                if (moveRight) controls.moveRight(playerSpeed * delta);
                if (moveLeft) controls.moveRight(-playerSpeed * delta);
            }

            // Bullet Movement & Collision Detection
            const enemyBox = new THREE.Box3().setFromObject(enemy);

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                
                // Move bullet forward
                b.position.addScaledVector(b.velocity, delta);

                // Check if bullet hits the enemy
                if (enemyBox.containsPoint(b.position)) {
                    // Hit detected! Remove bullet.
                    scene.remove(b);
                    bullets.splice(i, 1);
                    
                    // Increase Score
                    score++;
                    scoreDisplay.innerText = `Score: ${score}`;

                    // Teleport enemy to a new random location
                    const randomX = (Math.random() - 0.5) * 40;
                    const randomZ = (Math.random() - 0.5) * 40 - 10;
                    enemy.position.set(randomX, 1, randomZ);
                    continue; 
                }

                // Remove bullet if it travels too far (prevents lag)
                if (b.position.distanceTo(camera.position) > 100) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
