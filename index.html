<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS - 生存挑战</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
            cursor: pointer;
        }
        #score-display {
            position: absolute;
            top: 10px;
            right: 20px;
            color: white;
            font-size: 24px;
            font-family: sans-serif;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
        /* 新增：生命值显示样式 */
        #health-display {
            position: absolute;
            top: 40px;
            right: 20px;
            color: #ff3333;
            font-size: 24px;
            font-family: sans-serif;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="instructions">点击屏幕开始。WASD 移动。鼠标左键射击。<br>注意：避开怪物的攻击！</div>
    <div id="score-display">得分: 0</div>
    <div id="health-display">生命值: 100</div> <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 0);
        scene.add(directionalLight);

        const floorGeometry = new THREE.PlaneGeometry(150, 150);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 }); 
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const gunGeometry = new THREE.BoxGeometry(0.1, 0.1, 0.6);
        const gunMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 }); 
        const gun = new THREE.Mesh(gunGeometry, gunMaterial);
        gun.position.set(0.3, -0.2, -0.5); 
        camera.add(gun); 
        scene.add(camera); 

        const enemies = [];
        const enemyGeometry = new THREE.BoxGeometry(2, 2, 2);
        const enemyMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });

        function spawnEnemy() {
            const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
            const angle = Math.random() * Math.PI * 2;
            const radius = 20 + Math.random() * 30; 
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            enemy.position.set(x, 1, z);
            scene.add(enemy);
            enemies.push(enemy);
        }

        for (let i = 0; i < 10; i++) {
            spawnEnemy();
        }

        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        
        document.body.addEventListener('click', () => {
            if (!controls.isLocked) controls.lock();
        });

        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'block');
        scene.add(controls.getObject());

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
            }
        });
        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        const bullets = [];
        let score = 0;
        const scoreDisplay = document.getElementById('score-display');
        
        // 新增：玩家生命值和受伤冷却时间变量
        let playerHealth = 100;
        let lastDamageTime = 0;
        const healthDisplay = document.getElementById('health-display');

        window.addEventListener('mousedown', (event) => {
            if (controls.isLocked && event.button === 0) shoot();
        });

        function shoot() {
            const bulletGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 }); 
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);

            bullet.position.copy(camera.position);

            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);

            bullet.velocity = direction.multiplyScalar(120); 
            scene.add(bullet);
            bullets.push(bullet);
        }

        // 重置游戏函数
        function resetGame() {
